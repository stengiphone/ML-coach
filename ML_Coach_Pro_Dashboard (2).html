<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ML Coach Pro</title>
<style>body{background:#0f172a;color:#fff;font-family:Arial;padding:18px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #334155;padding:5px}input,select,textarea{width:100%;background:#1e293b;color:#fff;border:1px solid #475569}.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:8px}</style></head><body>
<h2>ML Coach Pro Dashboard</h2><div class=card><b>Stat:</b> Team Fight, Decision, Communication, Hero Pool, Micro, Macro, Laning, Objective, Rotation, Vision, Draft, Consistency, Mental</div>
<table id=t></table><button onclick="add()">+Tambah Player</button><div class=card id=l></div><div class=card><h3>Overall Team: <span id=o>0.00</span>/10</h3><textarea placeholder="Coach Notes"></textarea></div>
<script>
let K=["tf","dm","com","hp","mic","mac","lane","obj","rot","vis","draft","cons","mental"];
let N=["TeamFight","Decision","Communication","HeroPool","Micro","Macro","Laning","Objective","Rotation","Vision","Draft","Consistency","Mental"];
let P=[];
function add(){let p={name:"Player "+(P.length+1)};K.forEach(k=>p[k]=10);P.push(p);draw()}
for(let i=0;i<10;i++)add();
function draw(){let h="<tr><th>Name</th>";N.forEach(n=>h+="<th>"+n+"</th>");h+="</tr>";P.forEach((p,i)=>{h+="<tr><td><input value='"+p.name+"' oninput='P["+i+"].name=this.value;line()'></td>";K.forEach(k=>h+="<td><input type=number min=0 max=10 step=.1 value='"+p[k]+"' oninput='P["+i+"]."+k+"=+this.value;calc()'></td>");h+="</tr>"});t.innerHTML=h;line()}
function line(){let s="";for(let i=0;i<5;i++){s+="<select id=s"+i+" onchange=calc()>";P.forEach((p,j)=>s+="<option value="+j+">"+p.name+"</option>");s+="</select><br><br>"}l.innerHTML="<h3>Main Lineup (5)</h3>"+s;calc()}
function calc(){let sum=0,c=0;for(let i=0;i<5;i++){let p=P[s=document.getElementById("s"+i).value];K.forEach(k=>{sum+=p[k];c++})}o.textContent=(sum/c).toFixed(2)}
</script></body></html>
